{% extends 'base.html' %}
{% block title %}Create Channel{% endblock %}
{% block content %}

<div class="max-w-lg mx-auto mt-10 bg-white p-6 rounded-lg shadow">
    <h1 class="text-2xl font-bold mb-4">Create a Channel in {{ room.name }}</h1>

    <form method="POST">
        {% csrf_token %}
        <label class="block text-sm font-medium mb-1">Channel Name</label>
        <input type="text" name="name"
               class="w-full border px-3 py-2 rounded mb-4"
               placeholder="general, announcements, gaming, etc">

        <button class="w-full bg-purple-600 text-white py-2 rounded hover:bg-purple-700 transition">
            Create Channel
        </button>
    </form>
</div>

{% endblock %}
