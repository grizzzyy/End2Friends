<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>End2Friend</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <style>
        :root {
            --accent: #7c3aed;
            --accent-hover: #6d28d9;
            --accent-light: #ede9fe;
        }

        body {
            font-family: "Varela Round", sans-serif;
            background: #0f0a1f;
            overflow: hidden;
        }

        /* Animated gradient background */
        .auth-bg {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4c1d95, #7c3aed, #a78bfa);
            background-size: 300% 300%;
            animation: gradientMove 12s ease infinite;
            padding: 20px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating logo animation */
        .auth-logo {
            color: white;
            font-size: 26px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* White / frosted login card */
        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.6);

            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(10px); }
        }

        /* Headings inside card */
        .auth-card h1 {
            color: #1f2937;
        }

        .auth-card p {
            color: #6b7280;
        }

        /* Inputs: white with dark text */
        .auth-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;

            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 0, 0, 0.15);

            color: #1f2937;
            font-size: 14px;
            transition: 0.25s;
        }

        .auth-input::placeholder {
            color: #9ca3af;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.25);
        }

        /* Labels */
        .auth-label {
            color: #374151;
            font-size: 13px;
            margin-bottom: 4px;
            font-weight: 600;
        }

        /* Button */
        .auth-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: var(--accent);
            color: white;
            font-weight: 600;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: 0.25s;
        }

        .auth-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
        }

        /* Error box */
        .auth-error {
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid rgba(255, 100, 100, 0.4);
            color: #991b1b;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Footer */
        .auth-footer {
            margin-top: 20px;
            text-align: center;
            color: #4b5563;
            font-size: 13px;
        }

        .auth-footer a {
            color: var(--accent);
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="auth-bg">
        <div class="flex flex-col items-center">

            <div class="auth-logo">
                <span class="material-symbols-outlined">drone_2</span>
                End2Friend
            </div>

            <div class="auth-card">
                <h1 class="text-center text-xl font-bold mb-1">Welcome back!</h1>
                <p class="text-center text-sm mb-6">Enter your details to access your account.</p>

                <form class="flex flex-col gap-4" method="post">
                    {% csrf_token %}

                    {% if form.non_field_errors %}
                    <div class="auth-error">
                        <span class="material-symbols-outlined" style="font-size:18px;">error</span>
                        {{ form.non_field_errors }}
                    </div>
                    {% endif %}

                    <div>
                        <label class="auth-label">Username</label>
                        <input class="auth-input {% if form.username.errors %}border-red-400{% endif %}"
                               type="text" name="username"
                               value="{{ form.username.value|default_if_none:'' }}"
                               placeholder="Enter your username" required>
                    </div>

                    <div>
                        <label class="auth-label">Password</label>
                        <input class="auth-input {% if form.password.errors %}border-red-400{% endif %}"
                               type="password" name="password"
                               placeholder="Enter your password" required>
                    </div>

                    <button class="auth-btn" type="submit">Sign in</button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="{% url 'register' %}">Sign up</a>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
