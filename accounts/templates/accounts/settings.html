{% extends 'base.html' %}
{% block title %}Settings - End2Friend{% endblock %}

{% block content %}
<main class="flex-1 p-8" style="background: var(--bg-page);">

    <header class="mb-8">
        <h1 class="text-2xl font-bold t-text-primary">Settings</h1>
        <p class="mt-1 t-text-secondary">Manage your account preferences</p>
    </header>

    <div class="t-card p-6">
        <!-- Empty State - Coming Soon -->
        <div class="flex flex-col items-center justify-center py-16 text-center">
            <div class="w-20 h-20 rounded-full flex items-center justify-center mb-6"
                 style="background: linear-gradient(135deg, #E8B4D4 0%, #C4B5FD 100%);">
                <span class="material-symbols-outlined text-white text-4xl">construction</span>
            </div>
            <h3 class="text-xl font-bold t-text-primary mb-2">Settings coming soon</h3>
            <p class="t-text-muted mb-6 max-w-sm">
                We're working on bringing you customization options. Check back soon!
            </p>
            <a href="{% url 'dashboard' %}" class="t-btn-primary text-sm font-medium px-6 py-3">
                Back to Dashboard
            </a>
        </div>
    </div>

</main>
{% endblock %}
